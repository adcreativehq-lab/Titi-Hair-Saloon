<!DOCTYPE html>
<html lang="sq">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rezervo Tek Astrit Llugiqi</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">

<h2>Titi Hair Saloon</h2>

</div>

</header>

<section class="about">

<h2>Rezervo Termin Tek Astrit Llugiqi</h2>

<p>Plotëso formularin më poshtë.</p>

</section>

<section class="booking-form">

<form id="bookingForm">

<input
type="text"
id="name"
placeholder="Emri"
required>

<input
type="text"
id="surname"
placeholder="Mbiemri"
required>

<select id="service">

<option>Qethje</option>

<option>Rroje</option>

<option>Qethje dhe Rroje</option>

<option>Ngjyrosje e Flokëve</option>

<option>Ngjyrosje e Mjekrës</option>

<option>Ngjyrosje Flokë + Mjekër</option>

<option>Dyll i Fytyrës</option>

<option>Pastrim i Fytyrës</option>

<option>Shatir i Flokëve</option>

</select>

<input
type="date"
id="date"
required>

<select id="time">

<option>08:00</option>
<option>08:20</option>
<option>08:40</option>
<option>09:00</option>
<option>09:20</option>
<option>09:40</option>
<option>10:00</option>
<option>10:20</option>
<option>10:40</option>
<option>11:00</option>
<option>11:20</option>
<option>11:40</option>
<option>12:00</option>
<option>12:20</option>
<option>12:40</option>
<option>13:00</option>
<option>13:20</option>
<option>13:40</option>
<option>14:00</option>
<option>14:20</option>
<option>14:40</option>
<option>15:00</option>
<option>15:20</option>
<option>15:40</option>
<option>16:00</option>
<option>16:20</option>
<option>16:40</option>
<option>17:00</option>
<option>17:20</option>
<option>17:40</option>
<option>18:00</option>
<option>18:20</option>
<option>18:40</option>
<option>19:00</option>
<option>19:20</option>
<option>19:40</option>
<option>20:00</option>
<option>20:20</option>
<option>20:40</option>
<option>21:00</option>

</select>

<button type="submit" class="btn">

Rezervo Termin

</button>

</form>

</section>

<script>

document.getElementById("bookingForm").addEventListener("submit",function(e){

e.preventDefault();

let emri=document.getElementById("name").value;

let mbiemri=document.getElementById("surname").value;

let sherbimi=document.getElementById("service").value;

let data=document.getElementById("date").value;

let ora=document.getElementById("time").value;

let mesazhi=
`Pershendetje Astrit.

Dua te rezervoj nje termin.

Emri: ${emri}

Mbiemri: ${mbiemri}

Sherbimi: ${sherbimi}

Data: ${data}

Ora: ${ora}`;

window.open(
"https://wa.me/38344611144?text="+encodeURIComponent(mesazhi),
"_blank"
);

});

</script>

</body>

</html>
